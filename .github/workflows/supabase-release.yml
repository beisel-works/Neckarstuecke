name: Supabase Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: supabase-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supabase-release:
    name: supabase-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required Supabase secrets
        run: |
          missing=0
          for key in BLOB_READ_WRITE_TOKEN SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show remote migration status
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Seed initial catalog data
        run: supabase db query --linked -f supabase/seed.sql

      - name: Upload catalog assets to Blob
        working-directory: web
        run: |
          node scripts/sync-catalog-assets.mjs \
            --manifest ../motifs/exports/manifest.json \
            --sql ../tmp/catalog-assets.sql \
            --report ../tmp/catalog-assets-report.json

      - name: Apply catalog asset URLs
        run: supabase db query --linked -f tmp/catalog-assets.sql

      - name: Verify critical tables
        run: |
          supabase db query --linked "
            select
              to_regclass('public.prints') as prints,
              to_regclass('public.print_variants') as print_variants,
              to_regclass('public.orders') as orders,
              to_regclass('public.analytics_events') as analytics_events
          "

      - name: Verify seeded catalog
        run: |
          supabase db query --linked "
            select
              count(*) filter (where available) as available_prints,
              count(*) as total_prints
            from public.prints
          "

      - name: Verify print variants are deduplicated
        run: |
          supabase db query --linked "
            do \$\$
            begin
              if exists (
                select 1
                from public.print_variants
                group by print_id, width_mm, height_mm, format
                having count(*) > 1
              ) then
                raise exception 'Found duplicated print variants after seeding.';
              end if;
            end
            \$\$;
          "

      - name: Verify catalog images are populated
        run: |
          supabase db query --linked "
            select
              slug,
              image_web_preview_url is not null as has_web_preview,
              image_thumbnail_url is not null as has_thumbnail,
              image_og_url is not null as has_og
            from public.prints
            order by slug
          "
