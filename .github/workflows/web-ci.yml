name: Web CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: web-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deployment_environment: local
      deployment_url: http://127.0.0.1:3000
      tests: ${{ steps.junit-summary.outputs.tests }}
      failures: ${{ steps.junit-summary.outputs.failures }}
      skipped: ${{ steps.junit-summary.outputs.skipped }}
    env:
      CI: true
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Check required Supabase local CI files
        run: |
          missing=0
          [ -f supabase/config.toml ] || { echo "::error::Missing supabase/config.toml"; missing=1; }
          [ -f supabase/seed.sql ] || { echo "::error::Missing supabase/seed.sql"; missing=1; }
          exit "$missing"

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: |
          supabase start \
            --exclude studio,imgproxy,mailpit,storage-api,edge-runtime,postgres-meta,logflare,vector,supavisor
          supabase db reset --local --yes

      - name: Export local Supabase environment
        run: |
          supabase status -o env > /tmp/supabase.env
          . /tmp/supabase.env
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"

      - name: Lint web app
        working-directory: web
        run: pnpm lint

      - name: Typecheck web app
        working-directory: web
        run: pnpm typecheck

      - name: Run unit tests
        working-directory: web
        run: pnpm test

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: web
        run: pnpm test:e2e

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --project-id neckarstuecke --no-backup

      - name: Summarize JUnit results
        id: junit-summary
        if: always()
        working-directory: web
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const xmlPath = "test-results/e2e/junit.xml";
          const defaults = { tests: "0", failures: "0", skipped: "0" };
          if (!fs.existsSync(xmlPath)) {
            for (const [key, value] of Object.entries(defaults)) {
              console.log(`${key}=${value}`);
            }
            process.exit(0);
          }

          const xml = fs.readFileSync(xmlPath, "utf8");
          const match =
            xml.match(/<testsuites[^>]*tests="(\d+)"[^>]*failures="(\d+)"[^>]*skipped="(\d+)"/) ||
            xml.match(/<testsuite[^>]*tests="(\d+)"[^>]*failures="(\d+)"[^>]*skipped="(\d+)"/);

          const [tests, failures, skipped] = match?.slice(1) ?? ["0", "0", "0"];
          console.log(`tests=${tests}`);
          console.log(`failures=${failures}`);
          console.log(`skipped=${skipped}`);
          EOF

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ github.run_id }}
          path: |
            web/playwright-report
            web/test-results/e2e
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## web-e2e"
            echo ""
            echo "- Target: local"
            echo "- Deployment: http://127.0.0.1:3000"
            echo "- Tests: ${{ steps.junit-summary.outputs.tests }}"
            echo "- Failures: ${{ steps.junit-summary.outputs.failures }}"
            echo "- Skipped: ${{ steps.junit-summary.outputs.skipped }}"
            echo "- Artifacts: attached to this workflow run"
          } >> "$GITHUB_STEP_SUMMARY"

  pr-summary:
    name: PR summary
    if: github.event_name == 'pull_request' && always()
    needs:
      - web-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Comment on pull request
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_MODE: ${{ needs.web-e2e.outputs.deployment_environment }}
          DEPLOYMENT_URL: ${{ needs.web-e2e.outputs.deployment_url }}
          JOB_RESULT: ${{ needs.web-e2e.result }}
          TESTS: ${{ needs.web-e2e.outputs.tests }}
          FAILURES: ${{ needs.web-e2e.outputs.failures }}
          SKIPPED: ${{ needs.web-e2e.outputs.skipped }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = "<!-- web-ci-summary -->";
            const lines = [
              marker,
              "## web-e2e",
              "",
              `- Status: ${process.env.JOB_RESULT}`,
              `- Target: ${process.env.DEPLOYMENT_MODE || "local"}`,
              process.env.DEPLOYMENT_URL
                ? `- Deployment: ${process.env.DEPLOYMENT_URL}`
                : "- Deployment: http://127.0.0.1:3000",
              `- Tests: ${process.env.TESTS || "0"}`,
              `- Failures: ${process.env.FAILURES || "0"}`,
              `- Skipped: ${process.env.SKIPPED || "0"}`,
              `- Workflow run: ${process.env.RUN_URL}`,
              "- Artifacts: Playwright HTML report, traces, screenshots, and videos are attached to the workflow run.",
            ];

            if (process.env.JOB_RESULT !== "success") {
              lines.push("- Inspect the workflow run for the failing step and logs.");
            }

            const body = lines.join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const comment = comments.find((entry) => entry.body?.includes(marker));
            if (comment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: comment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
