<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60" role="img" aria-label="Neckarstücke">
  <title>Neckarstücke</title>

  <!--
    Neckarstücke — Wordmark Only
    Charcoal on transparent background.
    Use when the mark/symbol has already appeared nearby,
    or in contexts where vertical space is limited.
  -->

  <!-- Hairline rule above -->
  <line x1="50" y1="10" x2="350" y2="10" stroke="#1C2826" stroke-width="0.6"/>

  <!-- Wordmark -->
  <text
    x="200"
    y="40"
    font-family="'EB Garamond', 'Garamond', 'Cormorant Garamond', Georgia, serif"
    font-size="26"
    font-weight="400"
    letter-spacing="6"
    textLength="300"
    lengthAdjust="spacing"
    text-anchor="middle"
    fill="#1C2826">NECKARSTÜCKE</text>

  <!-- Hairline rule below -->
  <line x1="50" y1="53" x2="350" y2="53" stroke="#1C2826" stroke-width="0.6"/>
</svg>
