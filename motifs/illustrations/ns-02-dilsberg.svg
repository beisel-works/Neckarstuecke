<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" width="500" height="750"
     role="img" aria-label="Dilsberg — Neckarstücke NS-02">
  <title>Dilsberg — NS-02</title>

  <defs>
    <!-- Sky: Loess → Paper — Frühsommervormittag, klares Licht -->
    <linearGradient id="sky-02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FAFAF5"/>
      <stop offset="60%"  stop-color="#F3F0E7"/>
      <stop offset="100%" stop-color="#EDE9DC"/>
    </linearGradient>
  </defs>

  <!-- ── LAYER 0 · Sky ── -->
  <rect width="500" height="750" fill="url(#sky-02)"/>

  <!-- ── LAYER 1 · Far Odenwald ridge — River Stone ── -->
  <path d="M0,295 C80,270 160,285 240,272 C310,258 385,278 460,265 C480,260 495,268 500,270
           L500,340 L0,340 Z"
        fill="#6E7B77"/>

  <!-- ── LAYER 2 · Hill mass (Buntsandstein plateau) — Valley Sage base ── -->
  <!-- The rounded hill form — dominant element, slightly right of center -->
  <path d="M140,440 C155,320 190,240 252,210 C315,240 352,320 368,440 Z"
        fill="#3D6154"/>

  <!-- Hill lower slope rounding -->
  <path d="M105,490 C115,460 130,445 140,440 L368,440 C378,445 392,460 402,490
           C420,530 430,560 435,590 L85,590 C90,560 97,530 105,490 Z"
        fill="#3D6154"/>

  <!-- ── LAYER 3 · Village cluster atop plateau — Charcoal silhouette ── -->
  <!-- Ring wall — narrow horizontal band -->
  <rect x="188" y="260" width="128" height="14" fill="#1C2826"/>
  <rect x="182" y="268" width="140" height="8" fill="#EDE9DC" opacity="0.25"/>

  <!-- Houses: compact dark Dach-cluster -->
  <!-- Left houses -->
  <rect x="196" y="222" width="22" height="44" fill="#1C2826"/>
  <polygon points="194,225 207,206 220,225" fill="#1C2826"/>

  <rect x="216" y="230" width="18" height="36" fill="#1C2826"/>
  <polygon points="214,233 225,215 236,233" fill="#1C2826"/>

  <!-- Central tower stump -->
  <rect x="234" y="200" width="20" height="66" fill="#1C2826"/>
  <rect x="232" y="194" width="24" height="10" fill="#1C2826"/>
  <!-- Tower cap notch -->
  <rect x="234" y="192" width="5" height="8" fill="#EDE9DC" opacity="0.2"/>
  <rect x="243" y="190" width="5" height="10" fill="#EDE9DC" opacity="0.2"/>
  <rect x="251" y="192" width="5" height="8" fill="#EDE9DC" opacity="0.2"/>

  <!-- Right houses -->
  <rect x="252" y="228" width="20" height="38" fill="#1C2826"/>
  <polygon points="250,231 262,213 274,231" fill="#1C2826"/>

  <rect x="270" y="236" width="16" height="30" fill="#1C2826"/>
  <polygon points="268,239 278,222 288,239" fill="#1C2826"/>

  <!-- Ochre sandstone wall accent — ring wall base -->
  <rect x="185" y="272" width="134" height="6" fill="#8B5A14" opacity="0.45"/>

  <!-- ── LAYER 4 · Trees on plateau crown — Valley Sage mounds ── -->
  <ellipse cx="198" cy="218" rx="14" ry="10" fill="#3D6154"/>
  <ellipse cx="285" cy="224" rx="16" ry="11" fill="#3D6154"/>
  <ellipse cx="305" cy="238" rx="12" ry="9"  fill="#3D6154"/>

  <!-- ── LAYER 5 · Neckar valley floor — Loess band ── -->
  <rect x="0" y="590" width="500" height="50" fill="#EDE9DC"/>

  <!-- Neckar river as River Stone strip -->
  <path d="M0,602 C60,598 130,605 200,600 C270,595 340,604 420,599 C460,597 485,602 500,601
           L500,618 C480,622 440,617 400,621 C340,626 270,618 200,624
           C130,629 60,622 0,626 Z"
        fill="#6E7B77" opacity="0.7"/>

  <!-- Meadow / Wiesengrund — Valley Sage -->
  <rect x="0" y="635" width="500" height="115" fill="#3D6154"/>

  <!-- ── LAYER 6 · Small path figure — scale anchor (optional Charcoal silhouette) ── -->
  <!-- Tiny human figure on the valley road — max 4% of image area -->
  <rect x="88" y="599" width="4" height="11" fill="#1C2826"/>
  <ellipse cx="90" cy="597" rx="4" ry="4" fill="#1C2826"/>

  <!-- ── LAYER 7 · Typography zone ── -->
  <line x1="90" y1="672" x2="410" y2="672" stroke="#1C2826" stroke-width="0.6" opacity="0.4"/>

  <text x="252" y="700"
        font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
        font-size="30"
        font-weight="400"
        letter-spacing="6"
        text-anchor="middle"
        fill="#1C2826">DILSBERG</text>

  <text x="252" y="724"
        font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
        font-size="11"
        letter-spacing="3"
        text-anchor="middle"
        fill="#1C2826"
        opacity="0.50">NECKARSTÜCKE · NS-02</text>
</svg>
