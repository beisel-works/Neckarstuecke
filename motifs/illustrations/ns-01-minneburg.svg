<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" width="500" height="750"
     role="img" aria-label="Minneburg — Neckarstücke NS-01">
  <title>Minneburg — NS-01</title>

  <defs>
    <!-- Sky: Paper at apex, River Stone at horizon — Kühles Morgenlicht -->
    <linearGradient id="sky-01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FAFAF5"/>
      <stop offset="65%"  stop-color="#C5CCC9"/>
      <stop offset="100%" stop-color="#6E7B77"/>
    </linearGradient>
  </defs>

  <!-- ── LAYER 0 · Sky ── -->
  <rect width="500" height="750" fill="url(#sky-01)"/>

  <!-- ── LAYER 1 · Distant ridge — River Stone ── -->
  <path d="M0,390 C60,355 130,378 200,362 C270,346 340,372 420,358 C460,351 490,365 500,368
           L500,430 L0,430 Z"
        fill="#6E7B77"/>

  <!-- ── LAYER 2 · Middle-ground forest — Valley Sage ── -->
  <path d="M0,435 C35,415 70,428 105,416 C145,402 175,422 215,410
           C250,398 285,418 325,407 C365,395 400,418 445,408
           C470,402 490,415 500,418
           L500,580 L0,580 Z"
        fill="#3D6154"/>

  <!-- ── LAYER 3 · Foreground earth / forest floor — Charcoal ── -->
  <path d="M0,552 C30,535 65,548 100,538 C145,525 185,545 235,533
           C280,520 325,542 375,530 C420,518 465,538 500,528
           L500,750 L0,750 Z"
        fill="#1C2826"/>

  <!-- ── LAYER 4 · Ruined left curtain wall — Charcoal ── -->
  <!-- Broken irregular top silhouette -->
  <path d="M148,320 L148,295 L155,295 L155,307 L163,307 L163,288 L170,288 L170,302
           L177,302 L177,282 L184,282 L184,298 L190,298 L190,320 Z"
        fill="#1C2826"/>
  <rect x="148" y="318" width="42" height="168" fill="#1C2826"/>

  <!-- Small window — left wall -->
  <rect x="159" y="365" width="10" height="16" fill="#6E7B77" opacity="0.55"/>

  <!-- ── LAYER 5 · Main Bergfried (tower) — Charcoal ── -->
  <!-- Crenellated top -->
  <path d="M225,148 L225,125 L232,125 L232,140 L240,140 L240,118
           L248,118 L248,136 L256,136 L256,112 L264,112 L264,132
           L272,132 L272,122 L280,122 L280,148 Z"
        fill="#1C2826"/>
  <!-- Tower shaft -->
  <rect x="225" y="146" width="55" height="348" fill="#1C2826"/>

  <!-- Sidelight strip — Loess — west face catch-light -->
  <rect x="225" y="150" width="7" height="340" fill="#EDE9DC" opacity="0.18"/>

  <!-- Tower windows — narrow lancet slits -->
  <rect x="246" y="210" width="12" height="22" fill="#6E7B77" opacity="0.50"/>
  <rect x="246" y="295" width="12" height="18" fill="#6E7B77" opacity="0.45"/>
  <rect x="246" y="375" width="12" height="18" fill="#6E7B77" opacity="0.40"/>

  <!-- ── LAYER 6 · Foreground tree trunks — Charcoal (darker shapes) ── -->
  <!-- Left foreground tree -->
  <rect x="60"  y="480" width="14" height="270" fill="#1C2826"/>
  <ellipse cx="67"  cy="480" rx="38" ry="52" fill="#1C2826"/>

  <!-- Right foreground tree cluster -->
  <rect x="380" y="510" width="12" height="240" fill="#1C2826"/>
  <ellipse cx="386" cy="510" rx="32" ry="44" fill="#1C2826"/>
  <rect x="410" y="530" width="10" height="220" fill="#1C2826"/>
  <ellipse cx="415" cy="530" rx="26" ry="36" fill="#1C2826"/>

  <!-- ── LAYER 7 · Typography zone ── -->
  <!-- Thin hairline rule -->
  <line x1="90" y1="672" x2="410" y2="672" stroke="#FAFAF5" stroke-width="0.6" opacity="0.55"/>

  <text x="252" y="700"
        font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
        font-size="30"
        font-weight="400"
        letter-spacing="6"
        text-anchor="middle"
        fill="#FAFAF5">MINNEBURG</text>

  <!-- Collection mark -->
  <text x="252" y="724"
        font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
        font-size="11"
        letter-spacing="3"
        text-anchor="middle"
        fill="#FAFAF5"
        opacity="0.55">NECKARSTÜCKE · NS-01</text>
</svg>
