<?xml version="1.0" encoding="UTF-8"?>
<!--
  Neckarstücke — NS-03 Hirschhorn
  Lifestyle Mockup: Gerahmter Druck an weißer Wand
  Querformat 4:3 für Produktseite
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1400 1050" width="1400" height="1050"
     role="img" aria-label="Hirschhorn — Neckarstücke NS-03, gerahmt">
  <title>Hirschhorn NS-03 — Lifestyle Mockup</title>

  <defs>
    <!-- Slightly warmer wall for the warm-toned Hirschhorn motif -->
    <linearGradient id="wall-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4F0E6"/>
      <stop offset="100%" stop-color="#EAE5DA"/>
    </linearGradient>
    <filter id="frame-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="4" dy="8" stdDeviation="18" flood-color="#1C2826" flood-opacity="0.28"/>
    </filter>
    <filter id="mat-inner" x="0" y="0" width="100%" height="100%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#1C2826" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Wand -->
  <rect width="1400" height="1050" fill="url(#wall-bg)"/>
  <line x1="0" y1="980" x2="1400" y2="980" stroke="#D0CCC4" stroke-width="1.5"/>
  <rect x="0" y="980" width="1400" height="70" fill="#C8C4BC"/>

  <!-- Rahmen-Gruppe — schmaleres dunkles Profil für warmes Motiv -->
  <g transform="translate(426, 126)" filter="url(#frame-shadow)">

    <!-- Rahmen — schmales Schwarz/Stahl für Warmton-Kontrast -->
    <rect x="0" y="0" width="548" height="728" rx="1" fill="#2A2A28"/>
    <rect x="10" y="10" width="528" height="708" fill="#222220"/>
    <rect x="12" y="12" width="524" height="704" fill="#FAFAF8" filter="url(#mat-inner)"/>
    <rect x="64" y="64" width="420" height="600" fill="#FAFAF5"/>

    <!-- ══ MOTIV NS-03 HIRSCHHORN ══ -->
    <defs>
      <linearGradient id="sky-m03" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#8B5A14" stop-opacity="0.35"/>
        <stop offset="30%"  stop-color="#EDE9DC"/>
        <stop offset="100%" stop-color="#FAFAF5"/>
      </linearGradient>
      <linearGradient id="river-m03" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#8B5A14" stop-opacity="0.55"/>
        <stop offset="50%"  stop-color="#3D6154" stop-opacity="0.70"/>
        <stop offset="100%" stop-color="#1C2826"/>
      </linearGradient>
    </defs>

    <g transform="translate(64, 64)">
      <!-- Sky — golden hour, warm Loess-Ochre glow at apex -->
      <rect width="420" height="600" fill="url(#sky-m03)"/>

      <!-- Ochre promontory cliff — dominant right mass -->
      <path d="M230,165 C250,140 270,125 290,118 C310,110 330,115 350,125
               C370,135 390,148 420,160 L420,360 L230,360 Z" fill="#8B5A14"/>

      <!-- Cliff highlight (warm sidelight) -->
      <path d="M290,118 C300,122 315,128 325,138 C335,148 340,162 340,180
               L330,200 C325,175 315,155 300,138 C288,125 289,120 290,118 Z"
            fill="#EDE9DC" opacity="0.30"/>

      <!-- Burg Hirschhorn on cliff -->
      <!-- Main keep -->
      <rect x="280" y="82" width="35" height="90" fill="#1C2826"/>
      <path d="M278,82 L278,68 L284,68 L284,78 L290,78 L290,65
               L296,65 L296,76 L302,76 L302,62 L308,62 L308,74
               L315,74 L315,82 Z" fill="#1C2826"/>
      <!-- Keep window -->
      <rect x="292" y="102" width="9" height="16" fill="#8B5A14" opacity="0.55"/>

      <!-- Side building -->
      <rect x="245" y="118" width="40" height="60" fill="#1C2826" opacity="0.85"/>
      <rect x="255" y="135" width="7" height="12" fill="#8B5A14" opacity="0.45"/>

      <!-- Left hillside — Valley Sage -->
      <path d="M0,285 C40,258 85,270 130,260 C170,250 205,265 240,258
               L240,360 L0,360 Z" fill="#3D6154"/>

      <!-- River foreground — Neckar -->
      <rect x="0" y="355" width="420" height="105" fill="url(#river-m03)"/>

      <!-- River reflection of castle/cliff -->
      <path d="M280,360 C290,370 310,378 330,372 C350,366 380,355 420,360
               L420,420 L280,420 Z" fill="#8B5A14" opacity="0.25"/>

      <!-- Near bank — Valley Sage + foreground vegetation -->
      <path d="M0,442 C35,428 75,438 120,432 C165,425 210,436 260,430
               L260,600 L0,600 Z" fill="#3D6154"/>

      <!-- Far bank (right) — Charcoal silhouette -->
      <path d="M300,430 C330,420 365,428 400,422 L420,422 L420,600 L300,600 Z" fill="#1C2826"/>

      <!-- Typography — Ochre on Paper for warmth -->
      <line x1="75" y1="537" x2="345" y2="537" stroke="#EDE9DC" stroke-width="0.5" opacity="0.60"/>
      <text x="210" y="560"
            font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
            font-size="24" font-weight="400" letter-spacing="5" text-anchor="middle"
            fill="#EDE9DC">HIRSCHHORN</text>
      <text x="210" y="578"
            font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
            font-size="9" letter-spacing="2.5" text-anchor="middle"
            fill="#EDE9DC" opacity="0.55">NECKARSTÜCKE · NS-03</text>
    </g>
    <!-- ══ Ende Motiv ══ -->

  </g>

  <!-- Produktinfo -->
  <text x="700" y="912"
        font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
        font-size="20" font-weight="400" letter-spacing="3" text-anchor="middle"
        fill="#1C2826" opacity="0.75">HIRSCHHORN · NS-03</text>
  <text x="700" y="936"
        font-family="'EB Garamond', Garamond, 'Times New Roman', Georgia, serif"
        font-size="14" letter-spacing="1" text-anchor="middle"
        fill="#6E7B77">Giclée Feinkunstdruck · 50 × 70 cm · Hahnemühle German Etching 310 g/m²</text>
</svg>
